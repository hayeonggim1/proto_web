<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2단계 - 기차 창문</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="interaction-trigger" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111; color:white; display:flex; justify-content:center; align-items:center; z-index:999; cursor:pointer; font-size:20px; font-family:sans-serif;">
        [ 기차 창문 화면 ] 구동을 위해 화면을 한 번 클릭해 주세요.
    </div>

    <video id="window-video" src="train-window.mp4" preload="auto" muted playsinline></video>

    <script type="module">
        // 🛠️ 누락되었던 라이브러리(getDatabase, ref, onValue)를 CDN 주소에서 정확히 가져옵니다.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 기획자님의 파이어베이스 설정 데이터
        const firebaseConfig = {
            apiKey: "AIzaSyB20ad84ja_UqtWj9DUTx28MxSVNx83pt4",
            authDomain: "proto-web-sync.firebaseapp.com",
            databaseURL: "https://proto-web-sync-default-rtdb.firebaseio.com",
            projectId: "proto-web-sync",
            storageBucket: "proto-web-sync.firebasestorage.app",
            messagingSenderId: "663151649631",
            appId: "1:663151649631:web:57ef3a11b8758a7c270cea"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const windowVideo = document.getElementById('window-video');
        const trigger = document.getElementById('interaction-trigger');
        let timerId = null;
        let isFirstLoad = true; // 최초 접속 시 과거 잔여 데이터 오작동 방지 플래그

        console.log("[2단계 기차 창문] 시스템 로드 완료. 활성화 클릭을 기다리는 중...");

        trigger.addEventListener('click', () => {
            trigger.style.display = 'none';
            console.log("[2단계 기차 창문] 🔒 브라우저 락 해제. 완벽한 【영상 멈춤 및 실시간 신호 대기 상태】 돌입.");
            startListening(); 
        });

function startListening() {
            const triggerRef = ref(db, 'gallery/trigger');

            // 📥 [신호 받음] 데이터베이스 실시간 구독 시동
            onValue(triggerRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                // 새로고침 시 과거 신호에 오작동하지 않도록 필터링
                if (isFirstLoad) {
                    isFirstLoad = false;
                    console.log("[2단계 기차 창문] 🔍 데이터베이스 연결 성공. 실시간 수신 대기 중...");
                    return;
                }

                console.log("[2단계 기차 창문] 📥 [신호 받음] 1단계 매표소에서 종소리 트리거를 감지했습니다!");

                // 기존 진행 중이던 타이머나 영상이 있다면 강제 초기화 【영상 멈춤】
                clearTimeout(timerId);
                windowVideo.pause();
                windowVideo.currentTime = 0;

                // ⏱️ [타이머 작동] 역무원 영상 길이에 맞춰 11초 카운트다운 시작
                console.log("[2단계 기차 창문] ⏱️ 11초 타이머를 시작합니다. (역무원 안내 종료 후 출발 대기)");

                timerId = setTimeout(() => {
                    // 🎬 기차 주행 영상 시작
                    console.log("[2단계 기차 창문] 🎬 11초 경과! 기차 주행 영상(38초)을 자동으로 시작합니다.");
                    windowVideo.play().catch(e => console.log("재생 오류 발생:", e));
                }, 11000); // 11초(11000ms) 대기
            });
        }

        // 38초 주행 영상이 끝나면 실행되는 이벤트 리스너
        windowVideo.onended = () => {
            // 🔄 다음 관객을 위해 처음 상태로 리셋 【영상 멈춤】
            windowVideo.pause();
            windowVideo.currentTime = 0;
            console.log("[2단계 기차 창문] 🔄 주행 완료 및 종료. 다음 종소리 신호를 위해 【영상 멈춤 및 대기 상태】로 복귀합니다.");
        };
    </script>
</body>
</html>
