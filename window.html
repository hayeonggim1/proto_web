<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2단계 - 기차 창문</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* 출발 대기 중인 승강장 정지 이미지 배경 설정 가능 */
        #bg-container { width: 100%; height: 100%; background: url('waiting-platform.jpg') no-repeat center center; background-size: cover; display: block; }
    </style>
</head>
<body>

    <video id="window-video" src="src/assets/train-window.mp4" preload="auto" muted></video>

    <script>
        const windowVideo = document.getElementById('window-video');

        // 예시 타임라인 세팅 (전체 사이클: 40초)
        // 0초 ~ 10초: 출발 대기 (정지 상태)
        // 10초 ~ 40초: 재생 (기차 주행 및 불시착)
        const DEPARTURE_DELAY = 10000; // 10초 (밀리초 단위)
        const TOTAL_CYCLE = 40000;     // 40초

        function runTrainTimeline() {
            // 1. 처음에는 영상 정지 및 대기 (승강장 풍경 보임)
            windowVideo.pause();
            windowVideo.currentTime = 0;

            // 2. 10초 뒤에 기차 출발 (재생)
            setTimeout(() => {
                windowVideo.play();
            }, DEPARTURE_DELAY);
        }

        // 최초 실행
        runTrainTimeline();

        // 40초마다 이 타임라인 전체를 무한 반복 (1단계 로테이션 주기와 싱크 매칭)
        setInterval(() => {
            runTrainTimeline();
        }, TOTAL_CYCLE);
    </script>
</body>
</html>
