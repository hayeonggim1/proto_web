<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2단계 - 기차 창문</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="interaction-trigger" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#111; color:white; display:flex; justify-content:center; align-items:center; z-index:999; cursor:pointer; font-size:20px; font-family:sans-serif;">
        [ 기차 창문 화면 ] 구동을 위해 화면을 한 번 클릭해 주세요.
    </div>

    <video id="window-video" src="train-window.mp4" preload="auto" muted playsinline></video>

    <script type="module">
        // 🛠️ 누락되었던 라이브러리(getDatabase, ref, onValue)를 CDN 주소에서 정확히 가져옵니다.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 기획자님의 파이어베이스 설정 데이터
        const firebaseConfig = {
            apiKey: "AIzaSyB20ad84ja_UqtWj9DUTx28MxSVNx83pt4",
            authDomain: "proto-web-sync.firebaseapp.com",
            databaseURL: "https://proto-web-sync-default-rtdb.firebaseio.com",
            projectId: "proto-web-sync",
            storageBucket: "proto-web-sync.firebasestorage.app",
            messagingSenderId: "663151649631",
            appId: "1:663151649631:web:57ef3a11b8758a7c270cea"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        
        // 🛠️ 누락되었던 데이터베이스 객체(db)를 여기서 정의해 줍니다.
        const db = getDatabase(app);

        const windowVideo = document.getElementById('window-video');
        const trigger = document.getElementById('interaction-trigger');
        let timerId = null;

        trigger.addEventListener('click', () => {
            trigger.style.display = 'none';
            startListening(); 
        });

        function startListening() {
            // 이제 db와 ref가 정상 정의되어 에러가 나지 않습니다.
            const triggerRef = ref(db, 'gallery/trigger');

            onValue(triggerRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                clearTimeout(timerId);
                windowVideo.pause();
                windowVideo.currentTime = 0;

                // 1단계 종 터치 발생 시점으로부터 정확히 11초 뒤에 주행 영상 시작
                timerId = setTimeout(() => {
                    windowVideo.play().catch(e => console.log(e));
                }, 11000); 
            });
        }

        // 38초 주행이 끝나면 리셋 대기
        windowVideo.onended = () => {
            windowVideo.pause();
            windowVideo.currentTime = 0;
        };
    </script>
</body>
</html>
