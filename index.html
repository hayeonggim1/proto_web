<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1단계 - 다시역 매표소</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        /* 종이 있는 대기 화면 */
        #bell-screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111; cursor: pointer; color: #fff; }
        #bell-icon { font-size: 80px; margin-bottom: 20px; transition: transform 0.1s; }
        #bell-icon:active { transform: scale(0.9); }
        #hint-text { font-size: 18px; color: #aaa; letter-spacing: 1px; animation: blink 1.5s infinite; }
        /* 역무원 비디오 */
        video { display: none; width: 100%; height: 100%; object-fit: cover; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
  </head>
  <body>
<div id="bell-screen" onclick="startStation()">
        <div id="bell-icon">🔔</div>
        <div id="hint-text">종을 눌러 역무원을 호출해 주십시오.</div>
    </div>

    <video id="master-video" src="src/assets/stationmaster.mp4" preload="auto"></video>

    <script type="module">

      // Import the functions you need from the SDKs you need
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

      // TODO: Add SDKs for Firebase products that you want to use
      // https://firebase.google.com/docs/web/setup#available-libraries

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyB20ad84ja_UqtWj9DUTx28MxSVNx83pt4",
        authDomain: "proto-web-sync.firebaseapp.com",
        databaseURL: "https://proto-web-sync-default-rtdb.firebaseio.com",
        projectId: "proto-web-sync",
        storageBucket: "proto-web-sync.firebasestorage.app",
        messagingSenderId: "663151649631",
        appId: "1:663151649631:web:57ef3a11b8758a7c270cea"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      const bellScreen = document.getElementById('bell-screen');
      const video = document.getElementById('master-video');


      // 화면을 누르면 작동하는 타이밍 통제 기믹
      document.body.addEventListener('click', () => {
          if(bellScreen.style.display === 'none') return; // 이미 재생 중이면 무시

          bellScreen.style.display = 'none';
          video.play();

          // 🔔 [핵심] 종이 눌린 실제 시간(timestamp)을 데이터베이스에 기록하여 2단계에 신호 전송
          set(ref(db, 'gallery/trigger'), {
              status: "clicked",
              timestamp: Date.now()
          });
      });

      // 역무원 영상(11초)이 끝나면 대기화면으로 리셋
      video.onended = () => {
          video.currentTime = 0;
          bellScreen.style.display = 'flex';
      };
    </script>
  </body>
</html>
